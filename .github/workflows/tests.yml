name: tests

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Caches dependencies to speed up subsequent runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs the package in editable mode along with dev, torch, and model dependencies
          # We exclude 'gee' here assuming you don't have GEE credentials in CI yet
          pip install -e ".[dev,torch,models]"

      - name: Run tests
        run: |
          # The -v flag gives verbose output so you can see exactly which test failed
          pytest -v