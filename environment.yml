name: rsembed
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - ipykernel
  - pip:
      # PyTorch ecosystem (pinned for GPU/CUDA ABI compatibility)
      # torchgeo requires torch>=2.2 and torchvision>=0.17, but we pin exact versions
      - torch==2.10.0
      - torchvision==0.25.0

      # timm: pinned range required by thor (<=1.0.15) and torchgeo (>=1.0.3)
      - timm>=1.0.3,<=1.0.15

      # Remote sensing (git installs)
      # torchgeo pulls: einops, geopandas, kornia, lightly, lightning, matplotlib,
      #                 numpy, pandas, pillow, rasterio, segmentation-models-pytorch,
      #                 shapely, timm, torchmetrics, torchvision, typing-extensions
      # Pinned to v0.9.0; bump by updating the @tag below and verifying compatibility.
      - torchgeo @ git+https://github.com/torchgeo/torchgeo.git@v0.9.0
      # thor-terratorch-ext pulls: terratorch==1.2.1, thor (with timm<=1.0.15 constraint)
      # No release tags exist; pinned to a specific commit SHA.
      # Bump by replacing the SHA with a newer commit from the upstream repo.
      - thor-terratorch-ext @ git+https://github.com/FM4CS/thor_terratorch_ext.git@fdbc4c4345adfbdbc41ed5b497a05b56eeec96af

      # Foundation models & HuggingFace
      - transformers
      - diffusers
      - huggingface-hub
      - presto
      - geotessera
      - rshf
      - open-clip-torch==2.32.0

      # Computer vision
      - albumentations
      - opencv-python-headless
      - scikit-image

      # Geospatial data
      - rioxarray
      - xarray
      - netCDF4>=1.6
      - earthengine-api
      - geemap

      # Scientific computing
      - scipy
      - scikit-learn
      - h5py
      - dask
      - pyarrow
      - zarr

      # Experiment tracking & visualization
      - wandb
      - plotly

      # Config & utilities
      - hydra-core
      - pycocotools

      # Development
      - pytest
      - pytest-cov

      # Jupyter widgets
      - ipywidgets
